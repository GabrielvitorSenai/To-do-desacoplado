# ── Servidor ──────────────────────────────────────────────────
server.port=8088

# ── Banco de Dados MySQL ───────────────────────────────────────
# Altere as credenciais conforme o seu ambiente MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/kanban_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=senai
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────
# update = cria ou atualiza as tabelas automaticamente ao iniciar
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── Log ───────────────────────────────────────────────────────
logging.level.com.kanban=DEBUG
